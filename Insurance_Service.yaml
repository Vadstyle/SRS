openapi: 3.0.0
info:
  version: 1.0.0
  title: Сервис страхования
  description: API для оформления страхования для кредитного продукта
  termsOfService: https://courses.ru/terms
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    400_Bad_Request: 
      description: Bad Request Error
      content:
        application/json:
          example: {
            "error": "invalidParameters",
            "message": "Request is invalid"}
          schema:
            $ref: '#/components/schemas/Error_Response'
    401_Unauthorized:
      description: Unauthorized Error
      content:
        application/json:
          example:
            error: "authorizationFailed"
            message: "bearer authorization token expired"
          schema:
            $ref: '#/components/schemas/Error_Response'
    403_Forbidden:
      description: Forbidden Error
      content:
        application/json:
          example: {
            "error": "insufficientPermissions",
            "message": "This operation requires access"}
          schema:
            $ref: '#/components/schemas/Error_Response'
    404_Invalid_Access:
      description: Invalid Access Error
      content:
        application/json:
          example: {
            "error": "insufficientPermissions",
            "message": "No object found"}
          schema:
            $ref: '#/components/schemas/Error_Response'
    408_Request_Timeout_Error:
      description: Request Timeout Error
      content:
        application/json:
          example: {
            "error": "Request Timeout Error",
            "message": "Server didnt get request in time. Try again later"}
          schema:
            $ref: '#/components/schemas/Error_Response'
    409_Conflict:
      description: Conflict Error
      content:
        application/json:
          example: {
            "error": "Conflict",
            "message": "This action is already been done"}
          schema:
            $ref: '#/components/schemas/Error_Response'
    423_Locked:
      description: Locked
      content:
        application/json:
          example: {
            "error": "Locked",
            "message": "Resource is temporarily blocked. Try again later."}
          schema:
            $ref: '#/components/schemas/Error_Response'
    429_Too_many_requests:
      description: Too many requests Error
      content:
        application/json:
          example: {
            "error": "tooManyRequests",
            "message": "try again later"}
          schema:
            $ref: '#/components/schemas/Error_Response'
    400_Bad_Request_Idempotency: 
      description: Bad Request Error
      content:
        application/json:
          example: {
            "error": "Bad Request",
            "message": "Idempotency-Key is missing"}

  schemas:
    Error_Response:
      type: object
      additionalProperties: false
      properties:
        error_code:
          type: integer
          description: Код ошибки
        message:
          type: string
          description: Сообщение ошибки
    credit_product:
      type: object
      additionalProperties: false
      description: Кредитный продукт
      required:
        - credit_product_id
        - product_name
        - product_type
        - credit_product_status
        - loan_amount
        - current_loan_amount
        - loan_length
        - interest_rate
        - payment_frequency
        - insure_status
        - borrow_id
        - loan_created_at
        - _links
      properties:
        credit_product_id:
          type: string
          format: uuid
          description: Уникальный идентификатор кредитного продукта
          minLength: 36
          maxLength: 36
          example: 123e4567-e89b-12d3-a456-426614174000
        product_name:
          type: string
          description: Название продукта
          minLength: 1
          maxLength: 100
          example: Льготный кредит на квартиру
        product_type:
          type: string
          description: Тип кредитного продукта
          enum:
            - Кредит физическим лицам
            - Кредит юридическим лицам
            - Межбанковский кредит
            - Государственный кредит
          example: Государственный кредит
        credit_product_status:
          type: string
          description: Статус продукта
          enum:
            - активный
            - архивный
          example: активный
        loan_amount:
          type: string
          format: decimal
          description: Сумма кредита
          minimum: 1
          maximum: 1000000000
          example: 1000000
        current_loan_amount:
          type: string
          format: decimal
          description: Оставшаяся сумма кредита
          minimum: 0
          maximum: 1000000000
        loan_length:
          type: integer
          description: Срок кредита в месяцах
          minimum: 1
          maximum: 600
          example: 2
        interest_rate:
          type: string
          format: decimal
          description: Годовая ставка в процентах
          minimum: 0
          maximum: 100
          example: 13.6
        payment_frequency:
          type: string
          description: Частота платежей
          enum:
            - ежемесячно
            - ежегодно
          example: ежегодно
        insure_status:
          type: string
          description: Статус страхования
          enum:
            - нет страховки
            - есть страховка
          example: есть страховка
        borrow_id:
          type: string
          format: uuid
          description: Уникальный идентификатор заемщика
          minLength: 36
          maxLength: 36
          example: 123e4567-e89b-12d3-a456-426614174000
        loan_created_at:
          type: string
          format: date-time
          description: Дата и время оформления кредита
          example: 23.05.2026 19:59
        _links:
            $ref: '#/components/schemas/Links'
    borrower:
      type: object
      additionalProperties: false
      description: Заемщик
      required:
        - borrow_id
        - age
        - monthly_income
        - employment_status
        - credit_score
        - debt_to_income
        - _links
      properties:
        borrow_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Идентификатор клиента
          example: 123e4567-e89b-12d3-a456-426614174000
        age:
          type: integer
          description: Возраст заемщика
          minimum: 18
          maximum: 100
          example: 32
        monthly_income:
          type: number
          description: Официальный ежемесячный доход
          minimum: 0
          maximum: 100000000
          example: 250000
        employment_status:
          type: string
          description: Статус занятости
          enum: 
            - трудоустроен
            - самозанятый
            - безработный
          example: трудоустроен
        credit_score:
          type: integer
          description: Скоринговый балл
          minimum: 0
          maximum: 100
          example: 65
        debt_to_income:
          type: string
          format: decimal
          description: Отношение ежемесячных платежей по всем кредитам к доходу
          minimum: 0
          maximum: 100
          example: 1.65
        _links:
            $ref: '#/components/schemas/Links'
    insurance_contract:
      type: object
      additionalProperties: false
      description: Документ о заключении страхования
      required:
        - insurance_type
        - insurance_level
        - insurance_details
        - payment
        - borrow_id
        - created_at
        - _links
      properties:
        insurance_type:
          type: string
          description: тип страхования
          enum:
            - инверсивное страхование
            - страхование с залогом
          example: страхование с залогом
        insurance_level:
          type: string
          description: уровень страхования
          enum:
            - полное страхование
            - базовое страхование
          example: базовое страхование
        insurance_details:
          type: string
          description: На что распространяется страхование
          minLength: 1
          maxLength: 255
        payment:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/payment'
        payment_status:
          $ref: '#/components/schemas/payment_status'
        borrow_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Идентификатор клиента
          example: 123e4567-e89b-12d3-a456-426614174000
        created_at:
          type: string
          format: date-time
          description: дата и время страхования
          example: 23.05.2026 19:59 
        updated_at:
          type: string
          format: date-time
          description: дата и время страхования
          example: 24.05.2026 19:59 
        _links:
            $ref: '#/components/schemas/Links'
    payment:
      type: object
      additionalProperties: false
      description: Сведения об оплате страхования
      required:
        - payment_id
        - payment_details
        - payment summary
        - currency
        - paid_at
        - _links
      properties:
        payment_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: уникальный идентификатор оплаты
          example: 123e4567-e89b-12d3-a456-426614174000
        payment_details:
          type: string
          description: реквизиты оплаты (RNN)
          minLength: 12
          maxLength: 12
          example: 123456789012
        payment_sum:
          type: string
          format: decimal
          minimum: 0
          maximum: 1000000
          description: Размер оплаты
          example: 15000
        currency:
          type: string
          description: Валюта суммы продукта
          enum:
            - рубль
            - евро
            - доллар
          example: доллар
        paid_at:
          type: string
          format: date-time
          description: дата и время оплаты страхования
          example: 23.05.2026 19:59 
        _links:
            $ref: '#/components/schemas/Links'
    insurance_status:
      type: object
      additionalProperties: false
      description: Статус оформления страхования
      required:
        - contract_id
        - status
        - updated_at
      properties:
        contract_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Идентификатор договора страхования
          example: 123e4567-e89b-12d3-a456-426614174000
        status:
          type: string
          description: Текущий статус обработки
          enum:
            - pending
            - processing
            - completed
            - rejected
          example: completed
        message:
          type: string
          minLength: 1
          maxLength: 255
          description: Дополнительная информация
          example: Договор успешно оформлен
        updated_at:
          type: string
          format: date-time
          example: 2026-05-23 19:59:00
    payment_status:
      type: object
      additionalProperties: false
      description: Статус обработки платежа
      required:
        - payment_id
        - status
        - updated_at
      properties:
        payment_id:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: Идентификатор платежа
          example: 123e4567-e89b-12d3-a456-426614174000
        status:
          type: string
          description: Статус обработки платежа
          enum:
            - pending
            - processing
            - completed
            - failed
          example: processing
        message:
          type: string
          minLength: 1
          maxLength: 255
          description: Дополнительная информация
          example: Ожидается подтверждение от банка
        updated_at:
          type: string
          format: date-time
          description: Время последнего изменения статуса
          example: 2026-05-23 19:59:00
        _links:
          $ref: '#/components/schemas/Links'
    Link:
      type: object
      additionalProperties: false
      properties:
        href:
          type: string
          format: uri
          minLength: 1
          maxLength: 32000
          example: /api/v1/insurance_contracts/123
        method:
          type: string
          enum:
            - GET
            - POST
            - PATCH
            - DELETE
        rel:
          type: string
          minLength: 1
          maxLength: 30
          example: self
    Links:
      type: object
      additionalProperties: false
      properties:
        self:
          $ref: '#/components/schemas/Link'
        collection:
          $ref: '#/components/schemas/Link'
        borrower:
          $ref: '#/components/schemas/Link'
        credit_product:
          $ref: '#/components/schemas/Link'
        insurance_contract:
          $ref: '#/components/schemas/Link'
        payment:
          $ref: '#/components/schemas/Link'
        create:
          $ref: '#/components/schemas/Link'
        update:
          $ref: '#/components/schemas/Link'
        delete:
          $ref: '#/components/schemas/Link'

paths:
  /api/v1/credit_products:
    get:
      operationId: get_credit_products
      tags:
        - Credit Products
      security:
        - BearerAuth: []
      summary: Получение списка кредитных продуктов
      parameters:
        - name: page
          in: query
          required: false
          description: Номер страницы
          schema:
            type: integer
            minimum: 0
            default: 0
            example: 0
        - name: size
          in: query
          required: false
          description: Количество элементов на странице
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
            example: 10
        - name: search
          in: query
          required: false
          description: Полнотекстовый поиск по названию кредитного продукта
          schema:
            type: string
            minLength: 3
            maxLength: 100
            example: кредит
        - name: product_type
          in: query
          required: false
          description: Фильтр по типу кредитного продукта
          schema:
            type: string
            enum:
              - Кредит физическим лицам
              - Кредит юридическим лицам
              - Межбанковский кредит
              - Государственный кредит
        - name: credit_product_status
          in: query
          required: false
          description: Фильтр по статусу продукта
          schema:
            type: string
            enum:
              - активный
              - архивный
        - name: loan_amount_min
          in: query
          required: false
          description: Минимальная сумма кредита
          schema:
            type: number
            minimum: 0
            example: 100000
        - name: loan_amount_max
          in: query
          required: false
          description: Максимальная сумма кредита
          schema:
            type: number
            minimum: 0
            example: 1000000
        - name: interest_rate_min
          in: query
          required: false
          description: Минимальная процентная ставка
          schema:
            type: number
            minimum: 0
            maximum: 100
            example: 5
        - name: interest_rate_max
          in: query
          required: false
          description: Максимальная процентная ставка
          schema:
            type: number
            minimum: 0
            maximum: 100
            example: 15
        - name: sort
          in: query
          required: false
          description: Поле сортировки
          schema:
            type: string
            enum:
              - loan_amount
              - interest_rate
              - loan_length
              - loan_created_at
            example: loan_amount
        - name: direction
          in: query
          required: false
          description: Направление сортировки
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
            example: desc
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - content
                  - pagination
                properties:
                  content:
                    type: array
                    description: Список кредитных продуктов
                    items:
                      $ref: '#/components/schemas/credit_product'
                  pagination:
                    type: object
                    additionalProperties: false
                    required:
                      - page
                      - size
                      - total_elements
                      - total_pages
                    properties:
                      page:
                        type: integer
                        example: 0
                      size:
                        type: integer
                        example: 20
                      total_elements:
                        type: integer
                        example: 156
                      total_pages:
                        type: integer
                        example: 8
        '400':
          $ref: '#/components/responses/400_Bad_Request'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '408':
          $ref: '#/components/responses/408_Request_Timeout_Error'
        '423':
          $ref: '#/components/responses/423_Locked'
        '429':
          $ref: '#/components/responses/429_Too_many_requests'  
          
  /api/v1/credit_products/{credit_product_id}:
    get:
      operationId: get_credit_product
      tags:
        - Credit Products
      security:
        - BearerAuth: []
      summary: Просмотр кредитного продукта
      parameters:
        - name: credit_product_id
          in: path
          required: true
          description: Уникальный идентификатор кредитного продукта
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/credit_product'
        '400':
          $ref: '#/components/responses/400_Bad_Request'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_Invalid_Access'
        '408':
          $ref: '#/components/responses/408_Request_Timeout_Error'
        '423':
          $ref: '#/components/responses/423_Locked'
        '429':
          $ref: '#/components/responses/429_Too_many_requests'
      
  /api/v1/insurance_contracts:
    get:
      operationId: get_insurance_contracts
      tags:
        - Insurance Contracts
      security:
        - BearerAuth: []
      summary: Получение списка договоров страхования
      parameters:
      - name: page
        in: query
        required: false
        description: Номер страницы
        schema:
          type: integer
          minimum: 0
          default: 0
          example: 0
      - name: size
        in: query
        required: false
        description: Количество записей на странице
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
          example: 10
      - name: search
        in: query
        required: false
        description: Поиск по идентификатору заемщика или данным страхования
        schema:
          type: string
          minLength: 3
          maxLength: 255
          example: 123e4567
      - name: insurance_type
        in: query
        required: false
        description: Фильтр по типу страхования
        schema:
          type: string
          enum:
            - инверсивное страхование
            - страхование с залогом
          example: страхование с залогом
      - name: insurance_level
        in: query
        required: false
        description: Фильтр по уровню страхования
        schema:
          type: string
          enum:
            - полное страхование
            - базовое страхование
          example: полное страхование
      - name: borrow_id
        in: query
        required: false
        description: Фильтр по идентификатору заемщика
        schema:
          type: string
          format: uuid
          example: 123e4567-e89b-12d3-a456-426614174000
      - name: payment_status
        in: query
        required: false
        description: Статус оплаты страхования
        schema:
          type: string
          enum:
            - pending
            - processing
            - completed
            - failed
      - name: created_at_min
        in: query
        required: false
        description: Начальная дата создания договора
        schema:
          type: string
          format: date-time
          example: 2026-01-01 00:00:00
      - name: created_at_max
        in: query
        required: false
        description: Конечная дата создания договора
        schema:
          type: string
          format: date-time
          example: 2026-12-31 23:59:59
      - name: sort
        in: query
        required: false
        description: Поле сортировки
        schema:
          type: string
          enum:
            - created_at
            - updated_at
            - insurance_type
            - insurance_level
          example: created_at
      - name: direction
        in: query
        required: false
        description: Направление сортировки
        schema:
          type: string
          enum:
            - asc
            - desc
          default: desc
          example: desc
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                required:
                - content
                - pagination
                properties:
                  content:
                    type: array
                    description: Список договоров страхования
                    items:
                      $ref: '#/components/schemas/insurance_contract'
                  pagination:
                    type: object
                    additionalProperties: false
                    required:
                      - page
                      - size
                      - total_elements
                      - total_pages
                    properties:
                      page:
                        type: integer
                        example: 0
                      size:
                        type: integer
                        example: 20
                      total_elements:
                        type: integer
                        example: 350
                      total_pages:
                        type: integer
                        example: 18
        '400':
          $ref: '#/components/responses/400_Bad_Request'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '408':
          $ref: '#/components/responses/408_Request_Timeout_Error'
        '423':
          $ref: '#/components/responses/423_Locked'
        '429':
          $ref: '#/components/responses/429_Too_many_requests'
    
    post:
      operationId: create_insurance_contract
      tags:
        - Insurance Contracts
      security:
        - BearerAuth: []
      summary: Оформить страхование
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Ключ идемпотентности
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - credit_product_id
                - insurance_type
                - insurance_level
                - insurance_details
                - borrow_id
              properties:
                credit_product_id:
                  type: string
                  format: uuid
                  description: Идентификатор кредитного продукта
                insurance_type:
                  type: string
                  description: тип страхования
                  enum:
                    - инверсивное страхование
                    - страхование с залогом
                insurance_level:
                  type: string
                  description: уровень страхования
                  enum:
                    - полное страхование
                    - базовое страхование
                insurance_details:
                  type: string
                  description: На что распространяется страхование
                  minLength: 1
                  maxLength: 255
                borrow_id:
                  type: string
                  format: uuid
                  minLength: 36
                  maxLength: 36
                  description: Идентификатор клиента
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/insurance_contract'
        '400':
          $ref: '#/components/responses/400_Bad_Request_Idempotency'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_Invalid_Access'
        '408':
          $ref: '#/components/responses/408_Request_Timeout_Error'
        '409':
          $ref: '#/components/responses/409_Conflict'
        '423':
          $ref: '#/components/responses/423_Locked'
        '429':
          $ref: '#/components/responses/429_Too_many_requests' 

  /api/v1/insurance_contracts/{contract_id}:
    get:
      operationId: get_insurance_contract
      tags:
        - Insurance Contracts
